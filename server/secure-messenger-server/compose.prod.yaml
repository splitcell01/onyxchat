services:
  server:
    build: .
    image: secure-messenger-server:latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.prod
    # If your Go app listens on 8080 inside the container:
    ports:
      - "8080:8080"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secure_messenger
      POSTGRES_USER: securechat
      POSTGRES_PASSWORD: change-me
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securechat -d secure_messenger"]
      interval: 5s
      timeout: 3s
      retries: 8
    restart: unless-stopped

volumes:
  pgdata:
