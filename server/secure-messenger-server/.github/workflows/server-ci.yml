name: Server CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION:   us-east-1
  ECR_REPO:     onyxchat
  ECS_CLUSTER:  onyxchat-cluster
  ECS_SERVICE:  onyxchat-svc

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     sm
          POSTGRES_PASSWORD: sm
          POSTGRES_DB:       sm
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sm -d sm"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    outputs:
      image_uri: ${{ steps.image_uri.outputs.value }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5.3.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: gofmt check
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          if [[ -n "$files" ]]; then
            echo "gofmt found issues in:"
            echo "$files"
            echo
            gofmt -d .
            exit 1
          fi

      - name: tests (coverage)
        run: go test ./... -coverprofile=coverage.out

      - uses: docker/setup-buildx-action@v3

      - name: build image (CI smoke-test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: secure-messenger-server:ci
          load: true

      - name: run container + health check
        run: |
          set -euo pipefail
          docker rm -f sm-ci || true
          docker run -d --name sm-ci \
          -p 8080:8080 \
          --add-host=host.docker.internal:host-gateway \
          -e SM_SERVER_ADDR=":8080" \
          -e SM_DB_DSN="postgres://sm:sm@host.docker.internal:5432/sm?sslmode=disable" \
          -e SM_REDIS_ADDR="host.docker.internal:6379" \
          secure-messenger-server:ci

          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health/ready >/dev/null; then
              echo "ready"
              docker rm -f sm-ci
              exit 0
            fi
            echo "waiting for ready... ($i)"
            sleep 1
          done

          echo "---- sm-ci logs ----"
          docker logs sm-ci
          echo "ERROR: container never became ready"
          exit 1

      - name: stop container
        if: always()
        run: docker rm -f sm-ci

      - name: compute image URI
        id: image_uri
        run: |
          echo "value=675950137665.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Push & Deploy
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: login to ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: debug AWS identity
        run: |
          aws sts get-caller-identity
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} --region ${{ env.AWS_REGION }}

      - uses: docker/setup-buildx-action@v3

      - name: build & push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ needs.ci.outputs.image_uri }}
            675950137665.dkr.ecr.us-east-1.amazonaws.com/${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: deploy to ECS
        run: |
          aws ecs update-service \
            --cluster  "${{ env.ECS_CLUSTER }}" \
            --service  "${{ env.ECS_SERVICE }}" \
            --force-new-deployment \
            --output text \
            --query 'service.serviceName'

      - name: wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"
          echo "✅ deployment stable"
