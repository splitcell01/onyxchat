server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.+)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      # Parse zap JSON to extract level and trace_id as indexed labels.
      # trace_id is kept as a structured metadata field (not a label) to avoid
      # high-cardinality index churn while still being queryable.
      - json:
          expressions:
            level: level
            trace_id: trace_id
      - labels:
          level:
      - structured_metadata:
          values:
            trace_id:
