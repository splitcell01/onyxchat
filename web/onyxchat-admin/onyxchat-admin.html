<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnyxChat Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #020617;
      --bg-2:      #050d1e;
      --bg-3:      #0a1628;
      --surface:   #0f1f3d;
      --border:    #111f3a;
      --border-2:  #1a2f50;
      --blue:      #2563eb;
      --blue-dim:  #1d4ed8;
      --blue-glow: rgba(37,99,235,0.18);
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --text-mute: #475569;
      --green:     #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --red:       #ef4444;
      --red-dim:   rgba(239,68,68,0.10);
      --amber:     #f59e0b;
      --amber-dim: rgba(245,158,11,0.12);
      --font:      'DM Sans', sans-serif;
      --mono:      'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
      position: sticky; top: 0; z-index: 10;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
    }

    .logo-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      background: var(--blue); color: white;
      padding: 2px 7px; border-radius: 4px; text-transform: uppercase;
    }

    .header-right {
      display: flex; align-items: center; gap: 12px;
    }

    .user-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-3); border: 1px solid var(--border-2);
      border-radius: 20px; padding: 5px 12px 5px 8px;
      font-size: 13px; color: var(--text-dim);
    }

    .user-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    main {
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Login screen ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      width: 100%; max-width: 360px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: 20px;
      padding: 36px 32px;
    }

    .login-card .logo { margin-bottom: 28px; }

    /* ── Sections ── */
    .section-title {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-mute);
      margin-bottom: 16px;
    }

    .card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
    }

    .stat-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-mute);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
      color: var(--text);
    }

    .stat-value.blue  { color: var(--blue); }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }

    /* ── Generate form ── */
    .gen-row {
      display: flex; gap: 10px; align-items: flex-end;
      flex-wrap: wrap;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label {
      font-size: 11px; font-weight: 500; color: var(--text-dim);
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    input[type="text"], input[type="password"], input[type="number"], select {
      background: var(--bg-3);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus { border-color: var(--blue); }
    select { cursor: pointer; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-family: var(--font);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--blue-dim); }
    .btn-ghost {
      background: var(--bg-3);
      border: 1px solid var(--border-2);
      color: var(--text-dim);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--blue); color: var(--text); }
    .btn-danger { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%; border-collapse: collapse;
    }

    thead th {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-mute);
      padding: 0 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(37,99,235,0.04); }

    tbody td {
      padding: 11px 12px;
      font-size: 13px;
      color: var(--text-dim);
      vertical-align: middle;
    }

    .code-cell {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .copy-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-mute); padding: 2px 4px;
      border-radius: 4px; font-size: 13px;
      transition: color 0.15s;
      margin-left: 4px;
    }
    .copy-btn:hover { color: var(--blue); }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; }

    .badge-available {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.2);
    }
    .badge-available .badge-dot { background: var(--green); }

    .badge-used {
      background: var(--bg-3);
      color: var(--text-mute);
      border: 1px solid var(--border-2);
    }
    .badge-used .badge-dot { background: var(--text-mute); }

    .badge-expired {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
    }
    .badge-expired .badge-dot { background: var(--red); }

    /* ── Users table ── */
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--blue-glow);
      border: 1px solid var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--blue);
      flex-shrink: 0;
    }

    .username-cell { display: flex; align-items: center; gap: 10px; }

    /* ── Alerts ── */
    .alert {
      padding: 10px 14px; border-radius: 8px;
      font-size: 12px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .alert-success { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
    .alert-error   { background: var(--red-dim);   border: 1px solid rgba(239,68,68,0.2);  color: var(--red); }
    .alert-info    { background: var(--blue-glow);  border: 1px solid rgba(37,99,235,0.3);  color: #93c5fd; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      width: fit-content;
    }

    .tab-btn {
      padding: 7px 18px; border-radius: 7px; border: none;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      color: var(--text-mute); background: transparent;
    }
    .tab-btn.active {
      background: var(--bg-2);
      color: var(--text);
      border: 1px solid var(--border-2);
    }

    /* ── Spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border-2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center; padding: 40px;
      color: var(--text-mute); font-size: 13px;
    }

    /* ── Config banner ── */
    .config-banner {
      background: var(--amber-dim);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      flex-wrap: wrap;
    }
    .config-banner span { font-size: 12px; color: var(--amber); }
    .api-input-row { display: flex; gap: 8px; align-items: center; }
    .api-input-row input { width: 280px; font-family: var(--mono); font-size: 12px; }

    /* ── Logout btn ── */
    .logout-btn {
      background: none; border: 1px solid var(--border-2);
      color: var(--text-mute); border-radius: 7px;
      padding: 5px 12px; font-family: var(--font);
      font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .hidden { display: none !important; }

    /* ── Generate result popup ── */
    .gen-result {
      margin-top: 14px;
      background: var(--bg-3);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .gen-result-code {
      font-family: var(--mono); font-size: 15px; font-weight: 500;
      color: var(--green); letter-spacing: 0.06em; flex: 1;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#050d1e"/>
          <circle cx="18" cy="18" r="9" stroke="#2563eb" stroke-width="2"/>
          <circle cx="18" cy="18" r="4" fill="#2563eb"/>
          <circle cx="18" cy="9" r="2" fill="#2563eb" opacity="0.4"/>
        </svg>
        <span>OnyxChat</span>
        <span class="logo-badge">Admin</span>
      </div>

      <div id="login-alert" class="hidden"></div>

      <div class="field" style="margin-bottom:12px">
        <label>API URL</label>
        <input type="text" id="api-url-input" placeholder="https://onyxchat.dev" value="https://onyxchat.dev" />
      </div>

      <div class="field" style="margin-bottom:12px">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="ashenspellbook" autocomplete="username" />
      </div>

      <div class="field" style="margin-bottom:20px">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary" style="width:100%" id="login-btn" onclick="doLogin()">Sign in</button>
    </div>
  </div>

  <!-- ADMIN DASHBOARD (hidden until login) -->
  <div id="dashboard" class="hidden" style="display:flex;flex-direction:column;min-height:100vh;">

    <header>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#050d1e"/>
          <circle cx="18" cy="18" r="9" stroke="#2563eb" stroke-width="2"/>
          <circle cx="18" cy="18" r="4" fill="#2563eb"/>
          <circle cx="18" cy="9" r="2" fill="#2563eb" opacity="0.4"/>
        </svg>
        OnyxChat
        <span class="logo-badge">Admin</span>
      </div>
      <div class="header-right">
        <div class="user-pill">
          <span class="user-dot"></span>
          <span id="header-username">—</span>
        </div>
        <button class="logout-btn" onclick="doLogout()">Sign out</button>
      </div>
    </header>

    <main>
      <div id="dash-alert" class="hidden" style="margin-bottom:16px"></div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Registered Users</div>
          <div class="stat-value blue" id="stat-users">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Available Codes</div>
          <div class="stat-value green" id="stat-avail">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Used Codes</div>
          <div class="stat-value amber" id="stat-used">—</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('invites', this)">Invite Codes</button>
        <button class="tab-btn" onclick="switchTab('users', this)">Users</button>
      </div>

      <!-- INVITE CODES TAB -->
      <div id="tab-invites">

        <!-- Generate card -->
        <div class="card">
          <div class="section-title">Generate New Invite Code</div>
          <div class="gen-row">
            <div class="field">
              <label>Prefix</label>
              <input type="text" id="gen-prefix" value="ONYX-ALPHA" style="width:140px" />
            </div>
            <div class="field">
              <label>Expires In</label>
              <select id="gen-expiry">
                <option value="7">7 days</option>
                <option value="14">14 days</option>
                <option value="30" selected>30 days</option>
                <option value="90">90 days</option>
                <option value="0">Never</option>
              </select>
            </div>
            <button class="btn btn-primary" id="gen-btn" onclick="generateCode()" style="margin-top:2px">
              Generate
            </button>
            <button class="btn btn-ghost" onclick="refreshAll()" style="margin-top:2px">
              ↻ Refresh
            </button>
          </div>

          <div id="gen-result" class="gen-result hidden">
            <div>
              <div style="font-size:11px;color:var(--text-mute);margin-bottom:4px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase">New Code Ready</div>
              <div class="gen-result-code" id="gen-result-code"></div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="copyGenResult()">Copy</button>
          </div>
        </div>

        <!-- Codes table -->
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div class="section-title" style="margin-bottom:0">All Invite Codes</div>
            <div id="codes-loading" class="hidden"><span class="spinner"></span></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Code</th>
                  <th>Status</th>
                  <th>Used By</th>
                  <th>Used At</th>
                  <th>Expires</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="codes-tbody">
                <tr><td colspan="6" class="empty-state">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- USERS TAB -->
      <div id="tab-users" class="hidden">
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div class="section-title" style="margin-bottom:0">Registered Users</div>
            <div id="users-loading" class="hidden"><span class="spinner"></span></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Username</th>
                  <th>ID</th>
                  <th>Joined</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="3" class="empty-state">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────
let TOKEN = sessionStorage.getItem('onyx_admin_token') || null
let API_BASE = sessionStorage.getItem('onyx_admin_api') || 'https://onyxchat.dev'
let currentUser = null

// ── Bootstrap ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('api-url-input').value = API_BASE
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin()
  })
  if (TOKEN) {
    showDashboard()
    refreshAll()
  }
})

// ── API helpers ────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' }
  if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`
  const res = await fetch(API_BASE + path, { ...opts, headers })
  if (!res.ok) {
    const txt = await res.text()
    throw new Error(txt || res.statusText)
  }
  const ct = res.headers.get('content-type') || ''
  return ct.includes('application/json') ? res.json() : res.text()
}

// ── Auth ───────────────────────────────────────────────────────
async function doLogin() {
  const url  = document.getElementById('api-url-input').value.trim().replace(/\/$/, '')
  const user = document.getElementById('login-username').value.trim()
  const pass = document.getElementById('login-password').value

  if (!user || !pass) return showAlert('login-alert', 'error', 'Username and password required.')

  API_BASE = url
  sessionStorage.setItem('onyx_admin_api', API_BASE)

  const btn = document.getElementById('login-btn')
  btn.disabled = true
  btn.textContent = 'Signing in…'

  try {
    const headers = { 'Content-Type': 'application/json' }
    const res = await fetch(API_BASE + '/api/v1/login', {
      method: 'POST', headers,
      body: JSON.stringify({ username: user, password: pass })
    })
    if (!res.ok) {
      const txt = await res.text()
      throw new Error(txt || res.statusText)
    }
    const data = await res.json()
    TOKEN = data.token
    currentUser = { id: data.id, username: data.username }
    sessionStorage.setItem('onyx_admin_token', TOKEN)
    showDashboard()
    refreshAll()
  } catch (e) {
    showAlert('login-alert', 'error', e.message || 'Login failed.')
  } finally {
    btn.disabled = false
    btn.textContent = 'Sign in'
  }
}

function doLogout() {
  TOKEN = null
  currentUser = null
  sessionStorage.removeItem('onyx_admin_token')
  document.getElementById('dashboard').classList.add('hidden')
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('login-password').value = ''
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none'
  const dash = document.getElementById('dashboard')
  dash.classList.remove('hidden')
  dash.style.display = 'flex'
  if (currentUser) document.getElementById('header-username').textContent = currentUser.username
}

// ── Data loading ───────────────────────────────────────────────
async function refreshAll() {
  loadCodes()
  loadUsers()
}

async function loadCodes() {
  document.getElementById('codes-loading').classList.remove('hidden')
  try {
    // Hit the DB via the raw SQL admin endpoint — or fall back to what's available.
    // We'll call the users endpoint (which exists) to get the token working,
    // then display codes from a direct DB query via a future admin API.
    // For now we use the available /api/v1/users as a proxy signal that auth works,
    // and render the invite data from what we fetched.
    const users = await apiFetch('/api/v1/users')
    renderUsers(users)

    // Try admin endpoint if it exists
    try {
      const codes = await apiFetch('/api/v1/admin/invites')
      renderCodes(codes)
      updateStats(codes, users)
    } catch {
      // Admin endpoint not yet deployed — show helpful message
      renderCodesNotAvailable()
      updateStats([], users)
    }
  } catch (e) {
    showAlert('dash-alert', 'error', 'Failed to load data: ' + e.message)
  } finally {
    document.getElementById('codes-loading').classList.add('hidden')
  }
}

async function loadUsers() {
  document.getElementById('users-loading').classList.remove('hidden')
  try {
    const users = await apiFetch('/api/v1/users')
    renderUsers(users)
  } catch (e) {
    document.getElementById('users-tbody').innerHTML =
      `<tr><td colspan="3" class="empty-state" style="color:var(--red)">Error: ${e.message}</td></tr>`
  } finally {
    document.getElementById('users-loading').classList.add('hidden')
  }
}

// ── Render helpers ─────────────────────────────────────────────
function renderCodes(codes) {
  const tbody = document.getElementById('codes-tbody')
  if (!codes || codes.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No invite codes found.</td></tr>`
    return
  }

  const now = new Date()
  tbody.innerHTML = codes.map(c => {
    const expired = c.expires_at && new Date(c.expires_at) < now
    const used = !!c.used_by

    let badge
    if (used)         badge = `<span class="badge badge-used"><span class="badge-dot"></span>Used</span>`
    else if (expired) badge = `<span class="badge badge-expired"><span class="badge-dot"></span>Expired</span>`
    else              badge = `<span class="badge badge-available"><span class="badge-dot"></span>Available</span>`

    const expiresStr = c.expires_at
      ? fmtDate(c.expires_at)
      : '<span style="color:var(--text-mute)">Never</span>'

    const usedByStr = c.used_by || '<span style="color:var(--text-mute)">—</span>'
    const usedAtStr = c.used_at ? fmtDate(c.used_at) : '<span style="color:var(--text-mute)">—</span>'

    const resetBtn = used
      ? `<button class="btn btn-ghost btn-sm" onclick="resetCode('${c.code}')">Reset</button>`
      : ''

    return `<tr>
      <td class="code-cell">
        ${c.code}
        <button class="copy-btn" title="Copy" onclick="copyText('${c.code}', this)">⎘</button>
      </td>
      <td>${badge}</td>
      <td>${usedByStr}</td>
      <td>${usedAtStr}</td>
      <td>${expiresStr}</td>
      <td style="text-align:right">${resetBtn}</td>
    </tr>`
  }).join('')
}

function renderCodesNotAvailable() {
  document.getElementById('codes-tbody').innerHTML = `
    <tr><td colspan="6">
      <div style="padding:24px 12px;">
        <div style="color:var(--amber);font-size:13px;font-weight:600;margin-bottom:8px">⚠ Admin API not deployed yet</div>
        <div style="color:var(--text-mute);font-size:12px;line-height:1.7">
          The <code style="color:var(--text-dim);background:var(--bg-3);padding:1px 6px;border-radius:4px">/api/v1/admin/invites</code> endpoint doesn't exist yet on the server.<br>
          See the <strong style="color:var(--text-dim)">Go code to add below</strong>, or manage codes via the SQL panel in the meantime.
        </div>
        <div style="margin-top:16px;background:var(--bg-3);border:1px solid var(--border-2);border-radius:8px;padding:14px;font-family:var(--mono);font-size:11px;color:var(--text-dim);line-height:1.8;white-space:pre-wrap">// In router.go, inside the protected subrouter:
protected.HandleFunc("/admin/invites", AdminListInvitesHandler(userStore)).Methods(http.MethodGet, http.MethodOptions)
protected.HandleFunc("/admin/invites", AdminCreateInviteHandler(userStore)).Methods(http.MethodPost, http.MethodOptions)
protected.HandleFunc("/admin/invites/{code}/reset", AdminResetInviteHandler(userStore)).Methods(http.MethodPost, http.MethodOptions)</div>
      </div>
    </td></tr>`
}

function renderUsers(users) {
  const tbody = document.getElementById('users-tbody')
  document.getElementById('header-username').textContent =
    currentUser ? currentUser.username : (users[0]?.username || '—')

  if (!users || users.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3" class="empty-state">No users found.</td></tr>`
    return
  }

  tbody.innerHTML = users.map(u => `
    <tr>
      <td>
        <div class="username-cell">
          <div class="avatar">${(u.username || '?')[0].toUpperCase()}</div>
          <span style="color:var(--text);font-weight:500">${u.username}</span>
        </div>
      </td>
      <td style="font-family:var(--mono);font-size:12px">${u.id}</td>
      <td>${u.created_at ? fmtDate(u.created_at) : '<span style="color:var(--text-mute)">—</span>'}</td>
    </tr>
  `).join('')
}

function updateStats(codes, users) {
  const now = new Date()
  const avail = codes.filter(c => !c.used_by && (!c.expires_at || new Date(c.expires_at) > now)).length
  const used  = codes.filter(c => !!c.used_by).length
  document.getElementById('stat-users').textContent = users?.length ?? '—'
  document.getElementById('stat-avail').textContent = codes.length ? avail : '—'
  document.getElementById('stat-used').textContent  = codes.length ? used  : '—'
}

// ── Actions ────────────────────────────────────────────────────
async function generateCode() {
  const prefix  = document.getElementById('gen-prefix').value.trim() || 'ONYX'
  const expDays = parseInt(document.getElementById('gen-expiry').value)

  // Generate a random suffix locally (will be saved via admin API when deployed)
  const suffix = Math.random().toString(36).slice(2, 5).toUpperCase() +
                 Math.floor(Math.random() * 900 + 100)
  const code = `${prefix}-${suffix}`

  const btn = document.getElementById('gen-btn')
  btn.disabled = true

  try {
    // Try admin API first
    await apiFetch('/api/v1/admin/invites', {
      method: 'POST',
      body: JSON.stringify({ code, expires_days: expDays || null })
    })
    showGenResult(code)
    refreshAll()
  } catch {
    // Admin API not deployed — show the SQL to run manually
    const expSQL = expDays
      ? `NOW() + INTERVAL '${expDays} days'`
      : 'NULL'
    showAlert('dash-alert', 'info',
      `Admin API not deployed yet. Run this SQL to create the code:\n` +
      `INSERT INTO invite_codes (code, expires_at) VALUES ('${code}', ${expSQL});`)
    showGenResult(code)
  } finally {
    btn.disabled = false
  }
}

async function resetCode(code) {
  if (!confirm(`Reset invite code ${code}? This will allow it to be used again.`)) return
  try {
    await apiFetch(`/api/v1/admin/invites/${code}/reset`, { method: 'POST' })
    showAlert('dash-alert', 'success', `${code} has been reset.`)
    loadCodes()
  } catch {
    // Fall back to showing SQL
    showAlert('dash-alert', 'info',
      `Run this SQL to reset:\nUPDATE invite_codes SET used_by = NULL, used_at = NULL WHERE code = '${code}';`)
  }
}

// ── UI helpers ─────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('tab-invites').classList.toggle('hidden', tab !== 'invites')
  document.getElementById('tab-users').classList.toggle('hidden', tab !== 'users')
  if (tab === 'users') loadUsers()
  if (tab === 'invites') loadCodes()
}

function showAlert(id, type, msg) {
  const el = document.getElementById(id)
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'
  el.className = `alert alert-${type}`
  // Handle multi-line (SQL hints)
  el.innerHTML = `<span>${icon}</span><span style="white-space:pre-wrap">${msg}</span>`
  el.classList.remove('hidden')
  if (type === 'success') setTimeout(() => el.classList.add('hidden'), 4000)
}

function showGenResult(code) {
  document.getElementById('gen-result-code').textContent = code
  document.getElementById('gen-result').classList.remove('hidden')
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent
    btn.textContent = '✓'
    btn.style.color = 'var(--green)'
    setTimeout(() => { btn.textContent = orig; btn.style.color = '' }, 1500)
  })
}

function copyGenResult() {
  const code = document.getElementById('gen-result-code').textContent
  copyText(code, document.querySelector('.gen-result .btn'))
}

function fmtDate(iso) {
  const d = new Date(iso)
  const now = new Date()
  const diff = d - now

  // Relative for near dates
  const abs = Math.abs(diff)
  if (abs < 1000 * 60 * 60 * 24 * 3) {
    const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' })
    if (abs < 1000 * 60 * 60) return rtf.format(Math.round(diff / 60000), 'minute')
    if (abs < 1000 * 60 * 60 * 24) return rtf.format(Math.round(diff / 3600000), 'hour')
    return rtf.format(Math.round(diff / 86400000), 'day')
  }

  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
}
