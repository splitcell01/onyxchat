name: Desktop CI (Maven)

on:
  push:
    branches: ["main"]
    paths:
      - 'desktop/**'
  pull_request:
    paths:
      - 'desktop/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build (compile + package)
        working-directory: desktop/onyxchat-desktop
        run: mvn -B -ntp clean package
