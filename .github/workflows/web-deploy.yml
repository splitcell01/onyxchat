name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/onyxchat-web/package-lock.json

      - name: Install dependencies
        working-directory: web/onyxchat-web
        run: npm ci

      - name: Build
        working-directory: web/onyxchat-web
        env:
          VITE_API_URL: https://api.onyxchat.dev
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name onyxchat-web
          workingDirectory: web/onyxchat-web